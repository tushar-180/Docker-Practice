services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo_staging
      - PORT=5000
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: http://localhost:5001
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy

  mongo:
    image: mongo:latest
    ports:
      - "27019:27017"
    volumes:
      - mongo-staging:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-staging:
