services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo_prod
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: always # Always restart the container if it crashes

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        # User may override this via environment variable during build,
        # otherwise it defaults to the local 5000 port.
        VITE_API_URL: http://localhost:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always 

  mongo:
    image: mongo:latest
    volumes:
      - mongo-prod-data:/data/db
    restart: always

volumes:
  mongo-prod-data:
