services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo_prod
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always # Always restart the container if it crashes

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        # User may override this via environment variable during build,
        # otherwise it defaults to the local 5000 port.
        VITE_API_URL: http://localhost:5000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always 

  mongo:
    image: mongo:latest
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

volumes:
  mongo-prod-data:
