services:
  backend:
    build: ./server # build the image from the Dockerfile in the server directory
    ports:
      - "5000:5000" # map port 5000 on the host to port 5000 in the container
    volumes:
      - ./server:/app # Sync local server files to container (Hot Reload)
      - /app/node_modules # Prevent local node_modules from overwriting container's
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo_db # set the MONGO_URI environment variable
      - PORT=5000 # set the PORT environment variable
    depends_on:
      mongo:
        condition: service_healthy # wait for mongo to accept connections before starting backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "3000:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  mongo:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
